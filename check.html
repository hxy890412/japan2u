<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂單查詢 | Butterfly Ink</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-blue: #455a64; --success-green: #2e7d32; --pending-orange: #ef6c00; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        
        /* 搜尋框區 */
        .search-section { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; }
        input[type="text"] { width: 80%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .btn-search { padding: 12px 20px; background: var(--primary-blue); color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; width: 80%; font-weight: bold; }

        /* 訂單卡片樣式 */
        .order-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 6px solid #ccc; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .order-card.paid { border-left-color: var(--success-green); }
        .order-card.unpaid { border-left-color: var(--pending-orange); }

        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-top: 8px; }
        .status-paid { background: #e8f5e9; color: var(--success-green); }
        .status-unpaid { background: #fff3e0; color: var(--pending-orange); }
        
        .order-info { display: flex; justify-content: space-between; align-items: center; }
        .order-id { font-size: 11px; color: #999; margin-top: 10px; }
        
        #loading { text-align: center; color: #666; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="search-section">
        <h2 style="margin-top:0">🔍 訂單進度查詢</h2>
        <input type="text" id="searchName" placeholder="輸入您的社群名稱">
        <button class="btn-search" onclick="doSearch()">立即查詢</button>
    </div>

    <div id="loading">讀取中，請稍候...</div>
    <div id="result-list">
        </div>
</div>

<script>
    // ⚠️ 記得換成你的 GAS 網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzZk4sQWZUTJIYC5AqgcyUy32Bsfgv_k8dQkHH2_rT8qWt3jh6Fz61Eg07Kau62VXi8/exec"; 

    // 1. 網頁開啟時，檢查網址參數 (?name=XXX)
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const nameParam = urlParams.get('name');
        
        if (nameParam) {
            document.getElementById('searchName').value = nameParam;
            doSearch(); // 有名字就直接查
        }
    };

    // 2. 執行查詢
    async function doSearch() {
        const name = document.getElementById('searchName').value.trim();
        if (!name) return alert("請輸入名字再查詢喔！");

        const loading = document.getElementById('loading');
        const list = document.getElementById('result-list');
        
        loading.style.display = "block";
        list.innerHTML = "";

        try {
            const response = await fetch(`${GAS_URL}?searchKey=${encodeURIComponent(name)}`);
            const data = await response.json();
            renderResults(data);
        } catch (e) {
            list.innerHTML = "<p style='text-align:center; color:red;'>查詢出錯，請確認網路或名字是否正確。</p>";
        } finally {
            loading.style.display = "none";
        }
    }

    // 3. 渲染結果到網頁上
    function renderResults(orders) {
        const list = document.getElementById('result-list');
        if (orders.length === 0) {
            list.innerHTML = "<p style='text-align:center;'>查無訂單資料，請確認名字是否輸入正確。</p>";
            return;
        }

        // 把最新的訂單排在最上面
        orders.reverse().forEach(order => {
            const statusClass = order.isPaid ? 'status-paid' : 'status-unpaid';
            const cardClass = order.isPaid ? 'paid' : 'unpaid';
            const statusText = order.isPaid ? '✅ 已匯款 / 對帳完成' : '⏳ 待對帳 / 尚未匯款';

            list.innerHTML += `
                <div class="order-card ${cardClass}">
                    <div class="order-info">
                        <div style="font-weight:bold; font-size:16px;">${order.item}</div>
                        <div style="font-weight:bold;">$${order.price}</div>
                    </div>
                    <div style="font-size:14px; color:#666; margin-top:5px;">數量：${order.qty}</div>
                    <div class="status-badge ${statusClass}">${statusText}</div>
                    <div class="order-id">訂單編號：${order.id}</div>
                </div>
            `;
        });
    }
</script>

</body>
</html>
