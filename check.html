<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂單查詢 | 2U日本代購 🦋</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="top-nav">
        <a href="index.html" class="nav-logo">🦋 2U 日本代購</a>
    </nav>

    <div class="page-container">
        <div class="search-section">
            <h2 style="margin-top:0;">訂單進度查詢</h2>
            <div class="search-box-wrap">
                <input type="text" id="searchName" class="search-input" placeholder="輸入社群名稱搜尋">
                <button onclick="doSearch()" class="btn-primary-small">搜尋</button>
            </div>
        </div>

        <div class="summary-grid" id="summary-area" style="display:none;">
            <div class="sum-box">
                <span class="sum-label">訂單總額</span>
                <span class="sum-val" id="sum-total">$0</span>
            </div>
            <div class="sum-box">
                <span class="sum-label">已對帳</span>
                <span class="sum-val" id="sum-paid" style="color:var(--paid-green);">$0</span>
            </div>
            <div class="sum-box">
                <span class="sum-label">待付款</span>
                <span class="sum-val" id="sum-unpaid" style="color:var(--unpaid-red);">$0</span>
            </div>
        </div>

        <div id="loading" style="display:none; text-align:center; padding: 20px;">讀取中...🦋</div>

        <div id="results-content">
            <div id="unpaid-zone" style="display:none;">
                <div class="section-title">⏳ 待付款訂單 <small id="unpaid-count" style="font-weight:normal; color:#94a3b8; margin-left:8px;"></small></div>
                <div id="unpaid-list"></div>
            </div>

            <div id="paid-zone" style="display:none;">
                <div class="section-title" style="color:var(--paid-green);">✅ 已完成對帳 <small id="paid-count" style="font-weight:normal; color:#94a3b8; margin-left:8px;"></small></div>
                <div id="paid-list"></div>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyFLH4ltMsdr_TzrNO61ecoCisIClWaLeJhtjzznUi6eSOh9_r-4i85QpOhSt0SxJWJ/exec'; 
        
        window.onload = function() {
            const n = localStorage.getItem('socialName');
            if(n){ document.getElementById('searchName').value = n; doSearch(); }
        };

        async function doSearch() {
            const name = document.getElementById('searchName').value.trim();
            if(!name) return;
            localStorage.setItem('socialName', name);
            
            const loading = document.getElementById('loading');
            loading.style.display = "block";
            document.getElementById('summary-area').style.display = "none";
            document.getElementById('results-content').style.opacity = "0.3";

            try {
                const res = await fetch(`${GAS_URL}?searchKey=${encodeURIComponent(name)}`);
                const orders = await res.json();
                renderReceipts(orders);
            } catch (e) {
                alert("連線失敗");
            } finally {
                loading.style.display = "none";
                document.getElementById('results-content').style.opacity = "1";
            }
        }

        function renderReceipts(orders) {
            const summary = document.getElementById('summary-area');
            const unpaidList = document.getElementById('unpaid-list');
            const paidList = document.getElementById('paid-list');
            
            if(!orders || orders.length === 0){
                summary.style.display="none";
                document.getElementById('results-content').innerHTML = "<p style='text-align:center; padding: 50px; color:#94a3b8;'>目前查無您的訂單資料 🦋</p>";
                return;
            }

            summary.style.display = "grid";
            unpaidList.innerHTML = "";
            paidList.innerHTML = "";
            
            let totals = { all: 0, paid: 0, unpaid: 0, countP: 0, countU: 0 };

            orders.forEach(order => {
                totals.all += order.total;
                const itemsHtml = order.items.map(i => `
                    <div class="receipt-item">
                        <span>${i.name} x ${i.qty}</span>
                        <span style="font-weight:700;">$${i.sub}</span>
                    </div>
                `).join('');

                const cardHtml = `
                    <div class="receipt-container">
                        <div class="receipt-id">ORDER ID: ${order.id}</div>
                        <div style="font-size:12px; color:#94a3b8; margin-bottom:15px;">備註: ${order.note || '無'}</div>
                        ${itemsHtml}
                        <div style="text-align:right; margin-top:15px; border-top: 1px solid #f1f5f9; padding-top:10px;">
                            <span style="font-size:24px; font-weight:800; color:${order.isPaid?'var(--paid-green)':'var(--unpaid-red)'};">$${order.total}</span>
                        </div>
                    </div>
                `;

                if(order.isPaid){
                    paidList.innerHTML += cardHtml;
                    totals.paid += order.total;
                    totals.countP++;
                } else {
                    unpaidList.innerHTML += cardHtml;
                    totals.unpaid += order.total;
                    totals.countU++;
                }
            });

            document.getElementById('sum-total').innerText = `$${totals.all}`;
            document.getElementById('sum-paid').innerText = `$${totals.paid}`;
            document.getElementById('sum-unpaid').innerText = `$${totals.unpaid}`;
            document.getElementById('unpaid-zone').style.display = totals.countU > 0 ? "block" : "none";
            document.getElementById('paid-zone').style.display = totals.countP > 0 ? "block" : "none";
            document.getElementById('unpaid-count').innerText = `(${totals.countU} 筆)`;
            document.getElementById('paid-count').innerText = `(${totals.countP} 筆)`;
        }
    </script>
</body>
</html>
