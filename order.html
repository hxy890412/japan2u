<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>填寫訂單 | 2U日本代購 🦋</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="top-nav">
        <a href="index.html" class="nav-logo">🦋 2U 日本代購</a>
    </nav>

    <div class="page-container">
        <div class="category-bar" id="category-bar"></div>

        <div id="product-display" class="product-grid" style="margin-top:20px;">
            <p style="text-align:center; grid-column: 1/-1; padding: 50px; color: #94a3b8;">商品載入中...🦋</p>
        </div>
    </div>

    <button class="footer-btn" id="checkout-btn" onclick="openModal()">
        🛒 查看購物車 (<span id="cart-count">0</span>)
    </button>

    <div id="cart-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h3 style="margin-top:0;">確認訂單內容</h3>
            <div id="cart-items-list" class="cart-items-scroll"></div>
            
            <div class="user-status-tag">
                LINE 帳號：<span id="display-line-name">驗證身份中...</span>
            </div>
            
            <input type="text" id="socialName" class="modal-input" placeholder="請填寫社群名稱 (必填)">
            <input type="text" id="orderNote" class="modal-input" placeholder="備註需求 (選填)">
            
            <div style="display:flex; gap:12px;">
                <button onclick="closeModal()" class="btn-secondary">返回</button>
                <button id="submit-btn" onclick="submitOrder()" class="btn-primary">確認下單</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyFLH4ltMsdr_TzrNO61ecoCisIClWaLeJhtjzznUi6eSOh9_r-4i85QpOhSt0SxJWJ/exec'; 
        
        let allProducts = [];
        let cart = {};
        let lineUser = { id: '', name: '' };

        window.onload = async function() {
            // 1. 處理 LINE 登入 Code
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            
            if (code) {
                await fetchLineProfile(code);
            } else {
                document.getElementById('display-line-name').innerText = "未登入 (請回首頁)";
                document.getElementById('display-line-name').style.color = "#ef4444";
            }

            // 2. 載入商品與舊資料
            loadProducts();
            const savedName = localStorage.getItem('socialName');
            if (savedName) document.getElementById('socialName').value = savedName;
        };

        async function fetchLineProfile(code) {
            const nameEl = document.getElementById('display-line-name');
            try {
                const res = await fetch(`${GAS_URL}?action=getLineUser&code=${code}`);
                const data = await res.json();
                if (data.userId) {
                    lineUser = { id: data.userId, name: data.displayName };
                    nameEl.innerText = data.displayName;
                    nameEl.className = "status-success";
                } else {
                    nameEl.innerText = "驗證失效，請重新登入";
                }
            } catch (e) {
                nameEl.innerText = "連線 GAS 失敗";
            }
        }

        async function loadProducts() {
            try {
                const res = await fetch(`${GAS_URL}?action=getProducts`);
                allProducts = await res.json();
                renderCategories();
                renderProducts('全部');
            } catch (e) { console.error("商品載入失敗"); }
        }

        function renderCategories() {
            const categories = ['全部', ...new Set(allProducts.map(p => p.category))];
            document.getElementById('category-bar').innerHTML = categories.map(cat => 
                `<button class="cat-btn ${cat==='全部'?'active':''}" onclick="filterCategory('${cat}')">${cat}</button>`
            ).join('');
        }

        function filterCategory(cat) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderProducts(cat);
        }

        function renderProducts(cat) {
            const container = document.getElementById('product-display');
            const filtered = cat === '全部' ? allProducts : allProducts.filter(p => p.category === cat);
            
            container.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <img src="${p.img}" class="product-img">
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">$${p.price}</div>
                        <div class="qty-controls">
                            <button onclick="updateQty('${p.name}', -1, ${p.price})">-</button>
                            <span id="qty-${p.name}">${cart[p.name]?.qty || 0}</span>
                            <button onclick="updateQty('${p.name}', 1, ${p.price})">+</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateQty(name, change, price) {
            if (!cart[name]) cart[name] = { qty: 0, price: price };
            cart[name].qty = Math.max(0, cart[name].qty + change);
            document.getElementById(`qty-${name}`).innerText = cart[name].qty;
            document.getElementById('cart-count').innerText = Object.values(cart).reduce((s, i) => s + i.qty, 0);
        }

        function openModal() {
            let html = "";
            for (const [name, info] of Object.entries(cart)) {
                if (info.qty > 0) {
                    html += `<div class="receipt-item"><span>${name} x ${info.qty}</span><span>$${info.qty * info.price}</span></div>`;
                }
            }
            document.getElementById('cart-items-list').innerHTML = html || "<p style='text-align:center; color:#94a3b8;'>購物車空空的 🦋</p>";
            document.getElementById('cart-modal').style.display = 'block';
        }

        function closeModal() { document.getElementById('cart-modal').style.display = 'none'; }

        async function submitOrder() {
            const socialName = document.getElementById('socialName').value.trim();
            if (!socialName) return alert("請填寫社群名稱");
            
            const items = Object.entries(cart)
                .filter(([_, i]) => i.qty > 0)
                .map(([n, i]) => ({ product: n, qty: i.qty, price: i.price }));

            if (items.length === 0) return alert("請先選擇商品");

            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = "提交中...";

            try {
                await fetch(GAS_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ 
                        lineName: lineUser.name, 
                        socialMedia: socialName, 
                        note: document.getElementById('orderNote').value, 
                        items: items, 
                        userId: lineUser.id 
                    }) 
                });
                localStorage.setItem('socialName', socialName);
                alert("下單成功！🦋");
                window.location.href = "check.html";
            } catch (e) {
                alert("下單失敗，請稍後再試");
                btn.disabled = false; btn.innerText = "確認下單";
            }
        }
    </script>
</body>
</html>
