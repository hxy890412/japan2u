<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>填寫訂單 | 2U日本代購 🦋</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="top-nav">
        <a href="index.html" class="nav-logo">🦋 2U 日本代購</a>
    </nav>

    <div class="page-container">
        <div class="category-bar" id="category-bar">
            </div>

        <div id="product-display" class="product-grid">
            <p style="text-align:center; grid-column: 1/-1; padding: 50px; color: #999;">商品載入中...🦋</p>
        </div>
    </div>

    <button class="footer-btn" id="checkout-btn" onclick="openModal()">
        🛒 查看購物車 (<span id="cart-count">0</span>)
    </button>

    <div id="cart-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:2000; backdrop-filter: blur(8px);">
        <div style="background:white; margin:10vh auto; padding:30px; width:85%; max-width:400px; border-radius:24px; position:relative;">
            <h3 style="margin-top:0;">確認訂單</h3>
            <div id="cart-items-list" style="max-height:200px; overflow-y:auto; margin-bottom:20px; border-bottom:1px solid #eee; padding-bottom:10px;"></div>
            
            <div style="font-size: 14px; color: #666; margin-bottom: 15px;">
                LINE 帳號：<span id="display-line-name" style="color:var(--primary-red); font-weight:bold;">驗證中...</span>
            </div>
            
            <input type="text" id="socialName" placeholder="請填寫社群名稱 (必填)" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:10px; box-sizing: border-box;">
            <input type="text" id="orderNote" placeholder="備註 (選填)" style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ddd; border-radius:10px; box-sizing: border-box;">
            
            <div style="display:flex; gap:10px;">
                <button onclick="closeModal()" style="flex:1; padding:12px; border:none; border-radius:10px; background:#f0f0f0;">返回</button>
                <button id="submit-btn" onclick="submitOrder()" style="flex:2; padding:12px; background:var(--dark-blue); color:white; border:none; border-radius:10px; font-weight:bold;">確認下單</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxYjEGvCVZRHipsEfSxqx60f1kkXeyF6APG-k5-QWampsOoH06GcO71ylcb6wCYE0al/exec'; 
        let allProducts = [];
        let cart = {};
        let lineUser = { id: '', name: 'LINE用戶' };

        window.onload = async function() {
            // 1. 處理 LINE 登入 code
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            if (code) {
                await fetchLineProfile(code);
            }

            // 2. 載入商品
            loadProducts();
            
            // 3. 自動填入社群名稱
            const savedName = localStorage.getItem('socialName');
            if (savedName) document.getElementById('socialName').value = savedName;
        };

        async function fetchLineProfile(code) {
            try {
                const res = await fetch(`${GAS_URL}?action=getLineUser&code=${code}`);
                const data = await res.json();
                if (data.displayName) {
                    lineUser.name = data.displayName;
                    lineUser.id = data.userId;
                    document.getElementById('display-line-name').innerText = data.displayName;
                }
            } catch (e) {
                document.getElementById('display-line-name').innerText = "登入超時，請重新登入";
            }
        }

        async function loadProducts() {
            try {
                const res = await fetch(`${GAS_URL}?action=getProducts`);
                allProducts = await res.json();
                renderCategories();
                renderProducts('全部');
            } catch (e) {
                console.error("載入商品失敗");
            }
        }

        function renderCategories() {
            const categories = ['全部', ...new Set(allProducts.map(p => p.category))];
            const bar = document.getElementById('category-bar');
            bar.innerHTML = categories.map(cat => 
                `<button class="cat-btn ${cat==='全部'?'active':''}" onclick="filterCategory('${cat}')">${cat}</button>`
            ).join('');
        }

        function filterCategory(cat) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderProducts(cat);
        }

        function renderProducts(cat) {
            const container = document.getElementById('product-display');
            const filtered = cat === '全部' ? allProducts : allProducts.filter(p => p.category === cat);
            
            container.innerHTML = filtered.map(p => `
                <div class="product-card">
                    ${p.tag ? `<div class="badge">${p.tag}</div>` : ''}
                    <img src="${p.img}" class="product-img">
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">$${p.price}</div>
                        <div class="qty-controls">
                            <button onclick="updateQty('${p.name}', -1, ${p.price})">-</button>
                            <span id="qty-${p.name}">${cart[p.name]?.qty || 0}</span>
                            <button onclick="updateQty('${p.name}', 1, ${p.price})">+</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateQty(name, change, price) {
            if (!cart[name]) cart[name] = { qty: 0, price: price };
            cart[name].qty = Math.max(0, cart[name].qty + change);
            document.getElementById(`qty-${name}`).innerText = cart[name].qty;
            
            const totalItems = Object.values(cart).reduce((sum, i) => sum + i.qty, 0);
            document.getElementById('cart-count').innerText = totalItems;
        }

        function openModal() {
            const list = document.getElementById('cart-items-list');
            let html = "";
            for (const [name, info] of Object.entries(cart)) {
                if (info.qty > 0) {
                    html += `<div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:14px;">
                                <span>${name} x ${info.qty}</span>
                                <span>$${info.qty * info.price}</span>
                             </div>`;
                }
            }
            list.innerHTML = html || "<p style='text-align:center; color:#999;'>購物車是空的 🦋</p>";
            document.getElementById('cart-modal').style.display = 'block';
        }

        function closeModal() { document.getElementById('cart-modal').style.display = 'none'; }

        async function submitOrder() {
            const socialName = document.getElementById('socialName').value.trim();
            if (!socialName) return alert("請填寫社群名稱！");

            const finalItems = Object.entries(cart)
                .filter(([_, info]) => info.qty > 0)
                .map(([name, info]) => ({ product: name, qty: info.qty, price: info.price }));

            if (finalItems.length === 0) return alert("購物車沒有商品！");

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "提交中...";

            const payload = {
                lineName: lineUser.name,
                socialMedia: socialName,
                note: document.getElementById('orderNote').value,
                items: finalItems,
                userId: lineUser.id
            };

            try {
                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                localStorage.setItem('socialName', socialName);
                alert("下單成功！🦋");
                window.location.href = "check.html";
            } catch (e) {
                alert("下單失敗，請重新嘗試");
                btn.disabled = false;
                btn.innerText = "確認下單";
            }
        }
    </script>
</body>
</html>
