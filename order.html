<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>填寫訂單 | 2U日本代購</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="top-nav">
        <a href="index.html" class="nav-logo">🦋 2U 日本代購</a>
    </nav>

    <div class="page-container">
        <div class="category-bar" id="category-bar">
            <button class="cat-btn active" onclick="filterCategory('全部')">全部</button>
        </div>

        <div id="product-display" class="product-grid" style="margin-top:20px;">
            <p style="text-align:center; grid-column: 1/-1;">商品載入中...</p>
        </div>
    </div>

    <button class="footer-btn" id="checkout-btn" onclick="openModal()">
        🛒 查看購物車 (<span id="cart-count">0</span>)
    </button>

    <div id="cart-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000;">
        <div style="background:white; margin:10% auto; padding:20px; width:85%; max-width:400px; border-radius:20px; position:relative;">
            <h3 style="margin-top:0;">確認訂單內容</h3>
            <div id="cart-items-list" style="max-height:300px; overflow-y:auto; margin-bottom:15px;"></div>
            
            <div style="border-top:1px solid #eee; padding-top:10px;">
                <p>LINE 名稱：<span id="display-line-name">載入中...</span></p>
                <input type="text" id="socialName" placeholder="請填寫社群名稱 (必填)" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
                <input type="text" id="orderNote" placeholder="備註 (選填)" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ddd; border-radius:8px;">
                <div style="display:flex; gap:10px;">
                    <button onclick="closeModal()" style="flex:1; padding:10px; border:none; border-radius:8px;">返回</button>
                    <button onclick="submitOrder()" style="flex:2; padding:10px; background:var(--primary-red); color:white; border:none; border-radius:8px;">確認下單</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxQPqpF3suCYPcNNh_Z5vTzqTvWRJCTfCJj-WP1bJs9r2dogVwZ33AcFW_IhzTszes_/exec';
        let allProducts = [];
        let cart = {};
        let userInfo = { userId: '', displayName: '' };

        window.onload = async function() {
            // 1. 處理 LINE 回傳的 Code
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            if (code) {
                // 這裡通常會由前端傳 code 給 GAS，再由 GAS 換取 Profile
                // 暫時模擬取得名字 (實作時需串接 GAS 換取 Token)
                document.getElementById('display-line-name').innerText = "已連動 LINE";
            }

            // 2. 載入商品
            try {
                const res = await fetch(`${GAS_URL}?action=getProducts`);
                allProducts = await res.json();
                renderCategories();
                renderProducts('全部');
            } catch (e) {
                console.error("載入失敗", e);
            }
        };

        function renderCategories() {
            const categories = ['全部', ...new Set(allProducts.map(p => p.category))];
            const bar = document.getElementById('category-bar');
            bar.innerHTML = categories.map(cat => 
                `<button class="cat-btn" onclick="filterCategory('${cat}')">${cat}</button>`
            ).join('');
        }

        function filterCategory(cat) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderProducts(cat);
        }

        function renderProducts(cat) {
            const container = document.getElementById('product-display');
            const filtered = cat === '全部' ? allProducts : allProducts.filter(p => p.category === cat);
            
            container.innerHTML = filtered.map(p => `
                <div class="product-card">
                    ${p.tag ? `<div class="badge">${p.tag}</div>` : ''}
                    <img src="${p.img}" class="product-img">
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">$${p.price}</div>
                        <div class="qty-controls">
                            <button onclick="updateQty('${p.name}', -1, ${p.price})">-</button>
                            <span id="qty-${p.name}">${cart[p.name]?.qty || 0}</span>
                            <button onclick="updateQty('${p.name}', 1, ${p.price})">+</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateQty(name, change, price) {
            if (!cart[name]) cart[name] = { qty: 0, price: price };
            cart[name].qty = Math.max(0, cart[name].qty + change);
            document.getElementById(`qty-${name}`).innerText = cart[name].qty;
            
            const totalItems = Object.values(cart).reduce((sum, i) => sum + i.qty, 0);
            document.getElementById('cart-count').innerText = totalItems;
        }

        function openModal() {
            const list = document.getElementById('cart-items-list');
            let html = "";
            for (const [name, info] of Object.entries(cart)) {
                if (info.qty > 0) {
                    html += `<p>${name} x ${info.qty} = $${info.qty * info.price}</p>`;
                }
            }
            list.innerHTML = html || "<p>購物車是空的</p>";
            document.getElementById('cart-modal').style.display = 'block';
        }

        function closeModal() { document.getElementById('cart-modal').style.display = 'none'; }

        async function submitOrder() {
            const socialName = document.getElementById('socialName').value.trim();
            if (!socialName) return alert("請填寫社群名稱！");

            const finalItems = Object.entries(cart)
                .filter(([_, info]) => info.qty > 0)
                .map(([name, info]) => ({ product: name, qty: info.qty, price: info.price }));

            if (finalItems.length === 0) return alert("購物車沒有商品！");

            const payload = {
                lineName: "LINE用戶", // 需替換為真實 API 抓取的名稱
                socialMedia: socialName,
                note: document.getElementById('orderNote').value,
                items: finalItems,
                userId: "U12345678" // 需替換為真實 API 抓取的 ID
            };

            try {
                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                alert("下單成功！");
                localStorage.setItem('socialName', socialName);
                window.location.href = "check.html";
            } catch (e) {
                alert("下單失敗，請稍後再試");
            }
        }
    </script>
</body>
</html>
