<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本代購 | 填寫訂單</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--gray-bg); margin: 0; padding: 0px; color: #333; }
        .container { max-width: 800px; margin: 40px auto; }
        
    </style>
</head>
<body>
<nav class="top-nav">
    <a href="index.html" class="nav-logo">🦋 2u 日本代購</a>
</nav>
<div class="container">
    <div class="form-section">
        <h2 style="margin-top:0">📋 訂購人資訊</h2>
        <input type="text" id="socialName" placeholder="您的社群名稱 (例如: 櫻花小愛) *查詢訂單必填">
        <input type="text" id="orderNote" placeholder="備註事項 (選填)">
    </div>

    <h2>🛍️ 商品清單</h2>
    <div id="product-display" class="product-grid">
        <p style="text-align: center; grid-column: 1/-1;">商品載入中，請稍候...</p>
    </div>

    <button class="footer-btn" onclick="sendOrder()">確認送出訂單</button>
</div>

<script>
    // ⚠️ 請務必換成你部署後的 GAS 網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwo3QdUYTQPMs9FNy0dtbMWAPlvPYGlQKNf5Fynl_4i_H4v82QVQ6J34PYPOLgW49zA/exec"; 

    // 1. 頁面載入時自動執行：向 GAS 要商品資料
    window.onload = async function() {
        try {
            const response = await fetch(`${GAS_URL}?action=getProducts`);
            const products = await response.json();
            renderProducts(products);
        } catch (error) {
            document.getElementById('product-display').innerHTML = "載入失敗，請檢查網路或 GAS 網址。";
        }
    };

    // 2. 將商品資料畫在網頁上
    function renderProducts(products) {
        const container = document.getElementById('product-display');
        container.innerHTML = ""; // 清空載入中文字

        products.forEach(p => {
            container.innerHTML += `
                <div class="product-card">
                    ${p.tag ? `<div class="badge">${p.tag}</div>` : ''}
                    <img src="${p.img || 'https://via.placeholder.com/300'}" class="product-img">
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">$${p.price}</div>
                        <div class="qty-controls">
                            <label style="font-size:12px">數量:</label>
                            <input type="number" class="qty-input" data-name="${p.name}" data-price="${p.price}" value="0" min="0">
                        </div>
                    </div>
                </div>
            `;
        });
    }

    // 3. 送出訂單邏輯
    async function sendOrder() {
        const name = document.getElementById('socialName').value.trim();
        const note = document.getElementById('orderNote').value.trim();
        
        if (!name) return alert("請填寫社群名稱以便後續查詢！");

        const items = [];
        document.querySelectorAll('.qty-input').forEach(input => {
            const val = parseInt(input.value);
            if (val > 0) {
                items.push({
                    product: input.dataset.name,
                    price: input.dataset.price,
                    quantity: val
                });
            }
        });

        if (items.length === 0) return alert("尚未選擇任何商品。");

        // 鎖定按鈕防止重複點擊
        const btn = document.querySelector('.footer-btn');
        btn.disabled = true;
        btn.innerText = "傳送中...";

        const payload = {
            socialMedia: name,
            note: note,
            items: items
        };

        try {
            await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            });
            alert("訂單已送出！");
            // 跳轉到查詢頁面，並自動帶入名字
            window.location.href = `check.html?name=${encodeURIComponent(name)}`;
        } catch (e) {
            alert("送出失敗，請再試一次。");
            btn.disabled = false;
            btn.innerText = "確認送出訂單";
        }
    }
</script>

</body>
</html>
