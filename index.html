<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2U日本代購服務</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--dark-blue);
        }

        .container {
            text-align: center;
            background: white;
            padding: 50px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            width: 90%;
            max-width: 400px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: var(--dark-blue);
        }

        .sub-title {
            font-size: 14px;
            color: #888;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            text-decoration: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* 我要下單按鈕 */
        .btn-order {
            background-color: var(--primary-red);
            color: white;
            box-shadow: 0 4px 15px rgba(211,47,47,0.2);
        }

        .btn-order:hover {
            transform: translateY(-3px);
            background-color: #b71c1c;
            box-shadow: 0 6px 20px rgba(211,47,47,0.3);
        }

        /* 查詢訂單按鈕 */
        .btn-check {
            background-color: white;
            color: var(--dark-blue);
            border: 1px solid #ddd;
        }

        .btn-check:hover {
            transform: translateY(-3px);
            background-color: #f1f1f1;
            border-color: #bbb;
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #bbb;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">2U日本代購 🦋</div>
    <div class="sub-title">日本代購專用系統</div>

    <div class="btn-group">
        <a href="order.html" class="btn btn-order">
            <span>🛍️</span> 我要下單
        </a>
        <a href="check.html" class="btn btn-check">
            <span>🔍</span> 查詢訂單進度
        </a>
    </div>

    <div class="footer">
        © 2026 Japan2u Service.
    </div>
</div>

</body>
</html>
